<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F9F8F4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="春天花会开">
  <meta name="application-name" content="春天花会开">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <title>春天花会开</title>
  <!-- OpenGraph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="春天花会开">
  <meta property="og:description" content="二十四种春花，一册博物标本志。识花 · 打卡 · 记录与春天的每一次相遇。">
  <meta property="og:url" content="https://vernal-flora-archive.netlify.app">
  <meta property="og:image" content="https://vernal-flora-archive.netlify.app/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="zh_CN">
  <meta property="og:site_name" content="春天花会开">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="春天花会开">
  <meta name="twitter:description" content="二十四种春花，一册博物标本志。识花 · 打卡 · 记录与春天的每一次相遇。">
  <meta name="twitter:image" content="https://vernal-flora-archive.netlify.app/og-image.png">
  <link rel="stylesheet" href="styles/main.css">
  <script defer src="https://cloud.umami.is/script.js" data-website-id="66c2d899-3318-4ef9-ae7c-e3d984590244" data-do-not-track="true"></script>
</head>
<body>

  <!-- 加载页 -->
  <div id="loading-screen" class="loading-screen">
    <div id="loading-hero-svg"><img src="icons/icon-logo.png" alt="" class="hero-logo-img"></div>
    <div class="loading-title">春天花会开</div>
    <div class="loading-sub">识花 · 打卡 · 收藏</div>
  </div>

  <!-- 弹窗遮罩 -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-sheet" id="modal-content">
    </div>
  </div>

  <!-- ===== 首页 ===== -->
  <div id="page-home" class="page active">

    <!-- Hero -->
    <div class="hero-section">
      <div class="hero-bg-text">春</div>
      <div class="hero-logo" id="hero-svg-wrap"></div>
      <h1 class="hero-title">春天花会开</h1>
      <p class="hero-subtitle">识花 · 打卡 · 收藏</p>
      <div class="hero-cta">
        <button class="btn-primary" onclick="startQuiz()">开始识花</button>
        <button class="btn-secondary" onclick="navigateTo('collection')">查看标本墙</button>
      </div>
    </div>


  </div>

  <!-- ===== 识别页 ===== -->
  <div id="page-quiz" class="page">

    <!-- 物候日历面板 -->
    <div id="panel-calendar" class="quiz-panel">
      <!-- 月份轴 -->
      <div class="calendar-month-bar" id="calendar-month-bar">
        <button class="cal-month-btn active" data-month="2">2月</button>
        <button class="cal-month-btn" data-month="3">3月</button>
        <button class="cal-month-btn" data-month="4">4月</button>
        <button class="cal-month-btn" data-month="5">5月</button>
      </div>
      <!-- 节气提示 -->
      <div class="calendar-season-hint" id="calendar-season-hint"></div>
      <!-- 花卉卡片网格 -->
      <div class="calendar-flower-grid" id="calendar-flower-grid"></div>
    </div>

    <!-- 识花向导面板（从首页「开始识花」唤起） -->
    <div id="panel-guide" class="quiz-panel" style="display:none">
      <div class="quiz-header">
        <div class="quiz-header-title">识花向导</div>
        <div class="quiz-header-sub">根据特征，逐步锁定你遇见的花</div>
      </div>
      <div class="quiz-body" id="quiz-body"></div>
    </div>

  </div>

  <!-- ===== 标本墙 ===== -->
  <div id="page-collection" class="page">

    <div class="collection-header">
      <div>
        <div class="collection-title">博物标本墙</div>
        <div class="collection-count">已遇见 <span id="unlocked-count">0</span> / 24 种春花</div>
      </div>
      <button class="ach-entry-btn" onclick="openAchievementsPanel()">
        <span>🏆</span><span>成就</span>
      </button>
    </div>

    <!-- 时期筛选 -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all" onclick="setCollectionFilter('all')">全部</button>
      <button class="filter-btn" data-filter="early" onclick="setCollectionFilter('early')">早春</button>
      <button class="filter-btn" data-filter="mid" onclick="setCollectionFilter('mid')">仲春</button>
      <button class="filter-btn" data-filter="late" onclick="setCollectionFilter('late')">暮春</button>
    </div>

    <!-- 标本格子墙 -->
    <div class="collection-grid" id="collection-grid">
    </div>

    <!-- PPBC 鸣谢 -->
    <div class="ppbc-credit">
      <div class="ppbc-credit-text">
        花卉图片来自 <a href="https://ppbc.iplant.cn" target="_blank" rel="noopener">中国植物图像库 PPBC</a>
      </div>
      <div class="ppbc-credit-authors">
        图片捐献者：李光敏、朱鑫鑫、宋鼎、薛凯、赵宏、周繇、刘军、徐晔春、刘冰 等
      </div>
      <div class="ppbc-credit-maker">
        Made with care by <span style="font-family:'Noto Serif SC',serif;letter-spacing:0.1em">luvlua</span>
        <span class="ppbc-credit-sep">·</span>
        <a href="https://github.com/luvlua0808-png/Vernal-Flora-Archive" target="_blank" rel="noopener" class="ppbc-credit-text-link">GitHub</a>
        <span class="ppbc-credit-sep">·</span>
        <a href="#" id="privacy-link" class="ppbc-credit-text-link">隐私说明</a>
      </div>
    </div>

  </div>

  <!-- ===== 底部导航 ===== -->
  <nav class="nav-bar">
    <button class="nav-item active" data-page="home">
      <span class="nav-icon">🌿</span>
      <span class="nav-label">首页</span>
    </button>
    <button class="nav-item" data-page="quiz">
      <span class="nav-icon">🌸</span>
      <span class="nav-label">物候日历</span>
    </button>
    <button class="nav-item" data-page="collection">
      <span class="nav-icon">🗂</span>
      <span class="nav-label">标本墙</span>
    </button>
  </nav>

  <script src="data/flowers.js"></script>
  <script src="data/quiz.js"></script>
  <script src="data/achievements.js"></script>
  <script src="js/svgs.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>


</body>
</html>
